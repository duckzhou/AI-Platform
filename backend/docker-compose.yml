version: '3.8'

services:
  # FastAPI 应用
  api:
    build: .
    container_name: ai_platform_api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DATABASE=ai_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SECRET_KEY=your-secret-key-change-in-production
      - DEBUG=false
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
    networks:
      - ai_platform_network

  # Celery Worker
  worker:
    build: .
    container_name: ai_platform_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DATABASE=ai_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - SECRET_KEY=your-secret-key-change-in-production
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
    networks:
      - ai_platform_network

  # Celery Beat (定时任务)
  beat:
    build: .
    container_name: ai_platform_beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DATABASE=ai_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
    networks:
      - ai_platform_network

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: ai_platform_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ai_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_platform_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ai_platform_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai_platform_network

volumes:
  postgres_data:
  redis_data:

networks:
  ai_platform_network:
    driver: bridge
