version: '3.8'

services:
  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: ai_platform_postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE:-ai_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_platform_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: ai_platform_redis
    command: redis-server
    volumes:
      - redis_data:/data
    networks:
      - ai_platform_network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 前端服务 ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_platform_frontend
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - ai_platform_network
    restart: always

  # ==================== 后端服务 ====================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_platform_api
    expose:
      - "8000"
    environment:
      # 数据库配置（使用 Docker 内部网络）
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-ai_platform}
      
      # Redis 配置（使用 Docker 内部网络）
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      
      # JWT 配置
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
      
      # OSS 配置
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_BUCKET_NAME=${OSS_BUCKET_NAME:-aipl}
      - OSS_ENDPOINT=${OSS_ENDPOINT:-oss-cn-hangzhou.aliyuncs.com}
      
      # 大模型配置
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      
      # 应用配置
      - DEBUG=false
      - APP_NAME=AI Platform
      - VERSION=1.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - ai_platform_network
    restart: always

  # ==================== Celery Worker ====================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_platform_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      # 数据库配置（使用 Docker 内部网络）
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-ai_platform}
      
      # Redis 配置（使用 Docker 内部网络）
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      
      # JWT 配置
      - SECRET_KEY=${SECRET_KEY}
      
      # OSS 配置
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_BUCKET_NAME=${OSS_BUCKET_NAME:-aipl}
      - OSS_ENDPOINT=${OSS_ENDPOINT:-oss-cn-hangzhou.aliyuncs.com}
      
      # 大模型配置
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - ai_platform_network
    restart: always

networks:
  ai_platform_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
