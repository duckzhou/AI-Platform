version: '3.8'

services:
  # ==================== тЅЇуФ»ТюЇтіА ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_platform_frontend
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - ai_platform_network
    restart: always

  # ==================== тљјуФ»ТюЇтіА ====================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_platform_api
    expose:
      - "8000"
    environment:
      # ТЋ░ТЇ«т║ЊжЁЇуй«
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-ai_platform}
      
      # Redis жЁЇуй«
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=0
      
      # JWT жЁЇуй«
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
      
      # OSS жЁЇуй«
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_BUCKET_NAME=${OSS_BUCKET_NAME:-aipl}
      - OSS_ENDPOINT=${OSS_ENDPOINT:-oss-cn-hangzhou.aliyuncs.com}
      
      # тцДТеАтъІжЁЇуй«
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      
      # т║ћућежЁЇуй«
      - DEBUG=false
      - APP_NAME=AI Platform
      - VERSION=1.0.0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - ai_platform_network
    restart: always

  # ==================== Celery Worker ====================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_platform_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      # ТЋ░ТЇ«т║ЊжЁЇуй«
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE:-ai_platform}
      
      # Redis жЁЇуй«
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=0
      
      # JWT жЁЇуй«
      - SECRET_KEY=${SECRET_KEY}
      
      # OSS жЁЇуй«
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_BUCKET_NAME=${OSS_BUCKET_NAME:-aipl}
      - OSS_ENDPOINT=${OSS_ENDPOINT:-oss-cn-hangzhou.aliyuncs.com}
      
      # тцДТеАтъІжЁЇуй«
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - ai_platform_network
    restart: always

  # ==================== PostgreSQL ====================
  postgres:
    image: registry.cn-hangzhou.aliyuncs.com/library/postgres:15-alpine
    container_name: ai_platform_postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DATABASE:-ai_platform}
    ports:
      - "${POSTGRES_PORT_EXTERNAL:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db:/docker-entrypoint-initdb.d
    networks:
      - ai_platform_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis ====================
  redis:
    image: registry.cn-hangzhou.aliyuncs.com/library/redis:7-alpine
    container_name: ai_platform_redis
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai_platform_network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  ai_platform_network:
    driver: bridge
